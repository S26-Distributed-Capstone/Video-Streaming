<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dev Logs — Video Streaming</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf3;
      --panel-2: #f0e4d4;
      --text: #1f1a15;
      --muted: #786b5d;
      --line: rgba(31, 26, 21, 0.1);
      --accent: #c96d44;
      --accent-2: #dba55a;
      --accent-3: #4f8a78;
      --success-bg: rgba(79, 138, 120, 0.12);
      --success-text: #2d6655;
      --warn-bg: rgba(219, 165, 90, 0.14);
      --warn-text: #7a5a1e;
      --danger-bg: rgba(201, 109, 68, 0.12);
      --danger-text: #8a4324;
      --sans: "Avenir Next", "Segoe UI", sans-serif;
      --serif: "Iowan Old Style", Georgia, serif;
      --shadow: rgba(62, 42, 24, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--sans);
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    /* ── Header ────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .page-header h1 {
      padding: 20px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px var(--shadow);
    }

    /* ── Toolbar ───────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar label {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 600;
    }

    .toolbar select {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .toolbar select:focus {
      outline: none;
      border-color: rgba(201, 109, 68, 0.45);
      box-shadow: 0 0 0 4px rgba(201, 109, 68, 0.12);
    }

    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fffaf3;
      font: inherit;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
    }

    button.active-toggle {
      background: var(--accent-3);
      color: #fff;
    }

    .spacer { flex: 1; }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-3);
      margin-right: 4px;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── Log list ──────────────────────────────────── */
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 75vh;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .log-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .log-empty .empty-icon {
      font-size: 2.4rem;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    /* ── Individual log entry ──────────────────────── */
    .log-entry {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      transition: border-color 0.18s ease, background 0.18s ease;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-entry:hover {
      border-color: rgba(31, 26, 21, 0.18);
    }

    .log-entry.level-info {
      border-left: 4px solid var(--accent-3);
    }
    .log-entry.level-warn {
      border-left: 4px solid var(--accent-2);
      background: var(--warn-bg);
    }
    .log-entry.level-error {
      border-left: 4px solid var(--accent);
      background: var(--danger-bg);
    }

    /* Left column: level badge */
    .log-level {
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .level-info .log-level {
      background: var(--success-bg);
      color: var(--success-text);
    }
    .level-warn .log-level {
      background: var(--warn-bg);
      color: var(--warn-text);
    }
    .level-error .log-level {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    /* Right column: meta + message */
    .log-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .log-service {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .log-time {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .log-message {
      margin: 0;
      font-size: 0.92rem;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
    }

    .level-error .log-message { color: var(--danger-text); }
    .level-warn .log-message { color: var(--warn-text); }

    /* ── Error banner ──────────────────────────────── */
    .error-banner {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--danger-bg);
      color: var(--danger-text);
      border: 1px solid rgba(201, 109, 68, 0.15);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .hidden { display: none !important; }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 760px) {
      .shell { padding: 20px 14px; }
      .panel { padding: 14px; border-radius: 22px; }
      .page-header h1 { font-size: 2rem; }
      .toolbar { gap: 8px; }
      .log-level { width: 44px; height: 44px; font-size: 0.66rem; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="page-header">
      <h1>Dev Logs</h1>
    </header>

    <section class="panel">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-group">
          <label for="limitSelect">Show</label>
          <select id="limitSelect">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="250">250</option>
            <option value="500">500</option>
            <option value="1000">All</option>
          </select>
        </div>

        <div class="toolbar-group">
          <label for="levelFilter">Level</label>
          <select id="levelFilter">
            <option value="ALL">All</option>
            <option value="INFO">Info</option>
            <option value="WARN">Warn</option>
            <option value="ERROR">Error</option>
          </select>
        </div>

        <div class="toolbar-group">
          <label for="serviceFilter">Service</label>
          <select id="serviceFilter">
            <option value="ALL">All</option>
          </select>
        </div>

        <button id="refreshBtn" class="secondary" type="button">Refresh</button>
        <button id="autoRefreshBtn" type="button" class="secondary">Auto ▸</button>

        <span class="spacer"></span>

        <span id="statusIndicator" class="status-text"></span>
      </div>

      <!-- Error banner -->
      <div id="errorBanner" class="error-banner hidden"></div>

      <!-- Log entries -->
      <div id="logList" class="log-list">
        <div class="log-empty">
          <div class="empty-icon">📋</div>
          <div>No logs yet. Press <strong>Refresh</strong> or enable <strong>Auto</strong>.</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const logList = document.getElementById("logList");
    const limitSelect = document.getElementById("limitSelect");
    const levelFilter = document.getElementById("levelFilter");
    const serviceFilter = document.getElementById("serviceFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const autoRefreshBtn = document.getElementById("autoRefreshBtn");
    const statusIndicator = document.getElementById("statusIndicator");
    const errorBanner = document.getElementById("errorBanner");

    let autoRefreshId = null;
    const AUTO_REFRESH_MS = 3000;
    let knownServices = new Set();
    let allLogs = [];
    let totalInQueue = 0;

    /* ── Fetch logs ─────────────────────────────────── */
    async function fetchLogs() {
      const limit = limitSelect.value;
      try {
        const resp = await fetch(`/dev-logs?format=json&limit=${limit}`);
        if (!resp.ok) {
          const body = await resp.text();
          throw new Error(`HTTP ${resp.status}: ${body}`);
        }
        const data = await resp.json();
        allLogs = data.logs || [];
        totalInQueue = data.total || allLogs.length;
        updateServiceFilterOptions(allLogs);
        renderLogs();
        hideError();
        updateStatus(`showing ${allLogs.length} of ${totalInQueue} in queue`);
      } catch (err) {
        showError(`Failed to fetch logs — ${err.message}`);
        updateStatus("Error");
      }
    }

    /* ── Render ──────────────────────────────────────── */
    function renderLogs() {
      const level = levelFilter.value;
      const service = serviceFilter.value;

      const filtered = allLogs.filter(log => {
        if (level !== "ALL" && log.level !== level) return false;
        if (service !== "ALL" && log.service !== service) return false;
        return true;
      });

      if (filtered.length === 0) {
        logList.innerHTML =
          `<div class="log-empty">` +
            `<div class="empty-icon">📋</div>` +
            `<div>${allLogs.length > 0 ? "No logs match the current filters." : "No logs in the queue."}</div>` +
          `</div>`;
        return;
      }

      logList.innerHTML = filtered.map(renderEntry).join("");
      logList.scrollTop = logList.scrollHeight;
    }

    function renderEntry(log) {
      const levelClass = `level-${(log.level || "info").toLowerCase()}`;
      const time = formatTime(log.emittedAt);
      const escapedMsg = escapeHtml(log.message || log.formattedMessage || "");
      const escapedService = escapeHtml(log.service || "unknown");

      return (
        `<div class="log-entry ${levelClass}">` +
          `<div class="log-level">${escapeHtml(log.level || "INFO")}</div>` +
          `<div class="log-meta">` +
            `<span class="log-service">${escapedService}</span>` +
            `<span class="log-time">${time}</span>` +
          `</div>` +
          `<p class="log-message">${escapedMsg}</p>` +
        `</div>`
      );
    }

    function formatTime(iso) {
      if (!iso) return "";
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toLocaleString(undefined, {
          month: "short", day: "numeric",
          hour: "2-digit", minute: "2-digit", second: "2-digit",
          hour12: false
        });
      } catch (_) {
        return iso;
      }
    }

    function escapeHtml(s) {
      const el = document.createElement("span");
      el.textContent = s;
      return el.innerHTML;
    }

    /* ── Service filter discovery ─────────────────── */
    function updateServiceFilterOptions(logs) {
      logs.forEach(l => { if (l.service) knownServices.add(l.service); });
      const current = serviceFilter.value;
      const opts = ["ALL", ...Array.from(knownServices).sort()];

      serviceFilter.innerHTML = opts.map(s => {
        const label = s === "ALL" ? "All" : s;
        const selected = s === current ? " selected" : "";
        return `<option value="${escapeHtml(s)}"${selected}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    /* ── Auto-refresh ────────────────────────────────── */
    function toggleAutoRefresh() {
      if (autoRefreshId) {
        clearInterval(autoRefreshId);
        autoRefreshId = null;
        autoRefreshBtn.textContent = "Auto ▸";
        autoRefreshBtn.classList.remove("active-toggle");
        updateStatus("Auto-refresh paused");
      } else {
        fetchLogs();
        autoRefreshId = setInterval(fetchLogs, AUTO_REFRESH_MS);
        autoRefreshBtn.textContent = "Auto ■";
        autoRefreshBtn.classList.add("active-toggle");
        updateStatus("Auto-refreshing…");
      }
    }

    /* ── Status / error helpers ──────────────────────── */
    function updateStatus(msg) {
      if (!statusIndicator) return;
      const isLive = autoRefreshId !== null;
      statusIndicator.innerHTML = isLive
        ? `<span class="live-dot"></span> ${escapeHtml(msg)}`
        : escapeHtml(msg);
    }

    function showError(msg) {
      if (!errorBanner) return;
      errorBanner.textContent = msg;
      errorBanner.classList.remove("hidden");
    }

    function hideError() {
      if (!errorBanner) return;
      errorBanner.classList.add("hidden");
    }

    /* ── Event wiring ────────────────────────────────── */
    refreshBtn.addEventListener("click", fetchLogs);
    autoRefreshBtn.addEventListener("click", toggleAutoRefresh);
    levelFilter.addEventListener("change", renderLogs);
    serviceFilter.addEventListener("change", renderLogs);
    limitSelect.addEventListener("change", fetchLogs);

    /* Initial fetch */
    fetchLogs();
  </script>
</body>
</html>
