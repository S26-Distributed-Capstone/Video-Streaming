# ─── App image ──────────────────────────────────────────────────
image:
  repository: tanigross/video-streaming-app
  tag: "1.7"
  pullPolicy: IfNotPresent

# ─── Replica counts ────────────────────────────────────────────
uploadService:
  replicas: 1
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits:   { memory: "1Gi",   cpu: "1000m" }

statusService:
  replicas: 1
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits:   { memory: "1Gi",   cpu: "1000m" }

processingService:
  # Set to MIN_ACTIVE_NODES × REPLICAS_PER_NODE (2 × 6 = 12).
  # The autoscaler owns replica management after startup.
  replicas: 12
  spoolStorageSize: 5Gi
  resources:
    requests: { memory: "1Gi",  cpu: "1000m" }
    limits:   { memory: "2Gi",  cpu: "4000m" }


streamingService:
  replicas: 1
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits:   { memory: "1Gi",   cpu: "1000m" }

# ─── Autoscaler ─────────────────────────────────────────────────
autoscaler:
  image:
    repository: tanigross/video-streaming-autoscaler
    tag: "1.0"
    pullPolicy: IfNotPresent
  # 2 replicas on CP nodes — only the leader acts via k8s Lease
  replicas: 2
  # Cluster topology — adjust to match your actual node count
  totalNodes: 12
  minActiveNodes: 2          # always keep at least this many nodes uncordoned
  replicasPerNode: 6         # processing pods per active node
  # Queue depth thresholds
  scaleUpThreshold: 20       # uncordon a node when queue >= this value
  scaleDownThreshold: 5      # cordon a node when queue <= this value
  # Timing
  pollIntervalSeconds: 15
  scaleCooldownSeconds: 60   # minimum seconds between successive scale actions
  # Node selector label for worker nodes (must match your node labels)
  nodeLabelSelector: "workload-role=app"
  statefulsetName: ""        # leave blank to default to <release>-processing
  rabbitmqManagementPort: "15672"
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

# ─── Scheduling ────────────────────────────────────────────────
scheduling:
  infra:
    nodeSelector:
      workload-role: infra
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule

  app:
    {}

  processing:
    nodeSelector:
      workload-role: app

# ─── Infrastructure ────────────────────────────────────────────
postgres:
  storageSize: 5Gi

rabbitmq:
  replicas: 1
  storageSize: 2Gi

minio:
  storageSize: 10Gi
  # Pin MinIO to a specific IP from your MetalLB address pool.
  # Once set, MINIO_PUBLIC_ENDPOINT is auto-derived — no manual helm upgrade needed.
  # Pick any free IP from your MetalLB range, e.g. 192.168.1.200
  loadBalancerIP: ""

# ─── Credentials ────────────────────────────────────────────────
# DO NOT put real secrets here — this file is committed to git.
# Override via: helm install vs ./k8s -f k8s/values.secret.yaml
# Or inline:   helm install vs ./k8s --set secrets.pgPassword=xxx
secrets:
  pgUser: "admin"
  pgPassword: "admin123"
  rabbitmqUser: "admin"
  rabbitmqPass: "admin123"
  rabbitmqErlangCookie: "some_long_random_shared_secret"
  minioAccessKey: "minioadmin"
  minioSecretKey: "minioadmin"

# ─── App config ─────────────────────────────────────────────────
config:
  minioEndpoint: "http://minio:9000"
  # minioPublicEndpoint is auto-derived from minio.loadBalancerIP when that is set.
  # Only override this manually if you are NOT using minio.loadBalancerIP.
  minioPublicEndpoint: ""
  minioBucketName: "uploads"
  minioRegion: "us-east-1"
  chunkDuration: "6"
  pgDb: "videostreaming"
  rabbitmqHost: "rabbitmq"
  rabbitmqPort: "5672"
  rabbitmqVhost: "/"
  rabbitmqExchange: "upload.events"
  rabbitmqStatusQueue: "upload.status.queue"
  rabbitmqStatusBinding: "upload.status.*"
  rabbitmqStatusQueueProcessing: "processing.events.queue"
  rabbitmqTaskQueue: "upload.task.queue"
  rabbitmqTaskBinding: "upload.task.*"
  statusPort: "8081"
  processingPort: "8082"
  streamingPort: "8083"
  # Leave blank to let processing-service auto-size its local transcode worker pool
  # from the CPUs visible to the container (the app defaults to ~3/4 of available CPUs).
  workerPoolSize: ""
  processingRecoveryReconciliationMillis: "60000"
  processingRecoveryQueuedStaleMillis: "300000"
  # Keep one FFmpeg thread per worker unless benchmarks prove otherwise.
  threadsPerWorker: "1"
  ffmpegPreset: "superfast"
  processingSpoolRoot: "/app/processing-spool"
  storageRetryInitialDelayMs: "500"
  storageRetryMaxDelayMs: "5000"
  storageRetryMaxAttempts: "3"
  devLogMaxPeek: "100"

# ─── Service exposure ──────────────────────────────────────────
# LoadBalancer + "minikube tunnel" exposes services on localhost at their
# real ports (8080, 8081, 8083, 9000) — no port-forward needed.
service:
  type: LoadBalancer
  uploadNodePort: 30080       # only used when type=NodePort
  statusNodePort: 30081
  streamingNodePort: 30083
  minioNodePort: 30090        # only used when type=NodePort; set config.minioPublicEndpoint to http://<node-ip>:30090
