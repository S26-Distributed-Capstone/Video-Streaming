# ─── App image ──────────────────────────────────────────────────
image:
  repository: tanigross/video-streaming-app
  tag: "10-recovery-fix-20260514-1432"
  pullPolicy: IfNotPresent

# ─── Replica counts ────────────────────────────────────────────
uploadService:
  replicas: 1
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits:   { memory: "1Gi",   cpu: "1000m" }

statusService:
  replicas: 1
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits:   { memory: "1Gi",   cpu: "1000m" }

processingService:
  # Temporary replica count before the autoscaler leader bootstraps. Autoscaling OFF
  # then pins processing pods to minActiveNodes nodes filled with 1-CPU pods,
  # without cordoning any Kubernetes nodes.
  replicas: 2
  spoolStorageSize: 5Gi
  resources:
    requests: { memory: "1Gi",  cpu: "1000m" }
    limits:   { memory: "2Gi",  cpu: "1000m" }


streamingService:
  replicas: 1
  resources:
    requests: { memory: "512Mi", cpu: "250m" }
    limits:   { memory: "1Gi",   cpu: "1000m" }

# ─── Autoscaler ─────────────────────────────────────────────────
autoscaler:
  image:
    repository: tanigross/video-streaming-autoscaler
    tag: "1.6-upload-task-recovery-20260517"
    pullPolicy: IfNotPresent
  # 2 replicas on CP nodes — only the leader acts via k8s Lease
  replicas: 2
  # Cluster topology — adjust to match your actual node count
  totalNodes: 12
  minActiveNodes: 2          # always keep at least this many nodes uncordoned
  replicasPerNode: 1         # minimum processing pods per node (floor)
  replicasPerCpu: 1.0        # with 1 CPU requests/limits on processing pods, this means 1 processing pod per allocatable CPU core
  # Queue depth thresholds
  scaleUpThreshold: 20       # uncordon node(s) when queue >= this value
  scaleDownThreshold: 5      # cordon a node when queue <= this value
  # Multi-node burst scaling: nodes activated = min(maxScaleUpStep, ceil(queueDepth / scaleUpThreshold))
  # e.g. queue=60 → ceil(60/20)=3 nodes activated at once (capped at maxScaleUpStep)
  maxScaleUpStep: 3          # max nodes to activate per poll cycle
  maxScaleDownStep: 1        # max nodes to deactivate per poll cycle (conservative)
  # Timing
  pollIntervalSeconds: 10
  scaleCooldownSeconds: 10   # minimum seconds between successive scale actions
  scaleDownIdlePolls: 6      # require 6 idle polls before scale-down so emptyDir spool uploads can drain
  # Autoscaling starts OFF. In OFF mode, the leader pins only the processing
  # StatefulSet to minActiveNodes nodes filled with 1-CPU pods; it does not
  # cordon worker nodes. Turning it ON enables queue-based node cordon/uncordon.
  # Node selector label for worker nodes (must match your node labels)
  nodeLabelSelector: "workload-role=app"
  statefulsetName: ""        # leave blank to default to <release>-processing
  rabbitmqManagementPort: "15672"
  uploadTaskRecoveryStaleMillis: "60000"
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

# ─── Scheduling ────────────────────────────────────────────────
scheduling:
  infra:
    nodeSelector:
      workload-role: infra
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule

  app:
    {}

  processing:
    nodeSelector:
      workload-role: app

# ─── Infrastructure ────────────────────────────────────────────
postgres:
  storageSize: 5Gi
  # Explicit max_connections for the Postgres pod.
  # With PgBouncer enabled this only needs to cover pgbouncer.serverPoolSize
  # plus a small admin buffer (~10). Without PgBouncer raise this to:
  #   total_nodes × max_replicas_per_node × pgPoolSize + 20
  maxConnections: 100

# PgBouncer — connection pooler that decouples pod count from Postgres connections.
#
# How the math works with autoscaling:
#   Without PgBouncer:  connections = pods × pgPoolSize
#                       e.g. 72 pods × 10 = 720  (>> postgres max_connections)
#
#   With PgBouncer:     connections Postgres sees = serverPoolSize (fixed, e.g. 25)
#                       pods can have large HikariCP pools without limit concerns
#                       e.g. 72 pods × 10 app connections → PgBouncer → 25 real PG connections
#
# Tuning guide:
#   serverPoolSize: set to ~80% of postgres.maxConnections, leaving headroom for
#                   admin tools and the other services (upload, streaming, status).
#                   Recommended: maxConnections=100, serverPoolSize=25 leaves 75 for others.
#   maxClientConn:  must be >= total_nodes × max_replicas_per_node × config.pgPoolSize
#                   e.g. 12 nodes × 8 replicas × 10 pool = 960 → set to 1000.
#   pgPoolSize:     with PgBouncer, set this freely per-pod (10–20 is fine); PgBouncer
#                   queues excess requests rather than opening new Postgres connections.
#
pgbouncer:
  enabled: true
  image:
    repository: edoburu/pgbouncer
    tag: "latest"
    pullPolicy: IfNotPresent
  serverPoolSize: 25       # real Postgres connections maintained by PgBouncer
  minPoolSize: 5           # minimum warm connections even when idle
  maxClientConn: 1000      # max inbound app connections across ALL pods
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "200m", memory: "128Mi" }

rabbitmq:
  replicas: 1
  storageSize: 2Gi

minio:
  storageSize: 10Gi
  resources:
    # First tuning step for suspected storage pressure: give the single MinIO pod
    # stronger guaranteed CPU/memory so it is less likely to fall behind while
    # many processing pods flush local spool files concurrently.
    requests: { cpu: "1000m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "2Gi" }
  # Pin MinIO to a specific IP from your MetalLB address pool.
  # Once set, MINIO_PUBLIC_ENDPOINT is auto-derived — no manual helm upgrade needed.
  # Pick any free IP from your MetalLB range, e.g. 192.168.1.200
  loadBalancerIP: ""

# ─── Credentials ────────────────────────────────────────────────
# DO NOT put real secrets here — this file is committed to git.
# Override via: helm install vs ./k8s -f k8s/values.secret.yaml
# Or inline:   helm install vs ./k8s --set secrets.pgPassword=xxx
secrets:
  pgUser: "admin"
  pgPassword: "admin123"
  rabbitmqUser: "admin"
  rabbitmqPass: "admin123"
  rabbitmqErlangCookie: "some_long_random_shared_secret"
  minioAccessKey: "minioadmin"
  minioSecretKey: "minioadmin"

# ─── App config ─────────────────────────────────────────────────
config:
  minioEndpoint: "http://minio:9000"
  # minioPublicEndpoint is auto-derived from minio.loadBalancerIP when that is set.
  # Only override this manually if you are NOT using minio.loadBalancerIP.
  minioPublicEndpoint: ""
  minioBucketName: "uploads"
  minioRegion: "us-east-1"
  chunkDuration: "6"
  pgDb: "videostreaming"
  rabbitmqHost: "rabbitmq"
  rabbitmqPort: "5672"
  rabbitmqVhost: "/"
  rabbitmqExchange: "upload.events"
  rabbitmqStatusQueue: "upload.status.queue"
  rabbitmqStatusBinding: "upload.status.*"
  rabbitmqStatusQueueProcessing: "processing.events.queue"
  rabbitmqTaskQueue: "upload.task.queue"
  rabbitmqTaskBinding: "upload.task.*"
  statusPort: "8081"
  processingPort: "8082"
  streamingPort: "8083"
  # Explicitly pin one transcoding worker per processing pod so each pod stays a
  # single-core worker and the autoscaler can pack one pod per allocatable CPU.
  # Postgres connection pool size per pod (HikariCP).
  # With pgbouncer.enabled=true: set freely — PgBouncer absorbs the load.
  #   Recommended: 10 (gives each pod headroom for concurrent workers)
  # Without PgBouncer: must satisfy  pods × pgPoolSize <= postgres.maxConnections - 20
  #   e.g. maxConnections=100, max pods=12 → pgPoolSize <= 6
  pgPoolSize: "10"
  workerPoolSize: "1"
  # Number of concurrent segment uploads to MinIO from the upload-service.
  # Default formula: max(2, min(4, CPUs/2)) — hard-capped at 4 regardless of CPUs.
  # Since uploads are pure network I/O, this is NOT CPU-bound — raise it freely.
  # Recommended: 8–16 for fast MinIO. Leave blank to use the default formula.
  uploadThreadPoolSize: "16"
  # Max segments queued in-flight at once (default: uploadThreadPoolSize * 2).
  # Leave blank to use the default.
  maxInFlightSegmentUploads: ""
  processingRecoveryReconciliationMillis: "15000"
  processingRecoveryQueuedStaleMillis: "45000"
  localUploadWorkerCount: "6"
  # Keep one FFmpeg thread per worker unless benchmarks prove otherwise.
  threadsPerWorker: "1"
  ffmpegPreset: "superfast"
  processingSpoolRoot: "/app/processing-spool"
  storageRetryInitialDelayMs: "500"
  storageRetryMaxDelayMs: "5000"
  storageRetryMaxAttempts: "3"
  devLogMaxPeek: "100"

# ─── Service exposure ──────────────────────────────────────────
# LoadBalancer + "minikube tunnel" exposes services on localhost at their
# real ports (8080, 8081, 8083, 9000) — no port-forward needed.
service:
  type: LoadBalancer
  uploadNodePort: 30080       # only used when type=NodePort
  statusNodePort: 30081
  streamingNodePort: 30083
  autoscalerNodePort: 30084
  minioNodePort: 30090        # only used when type=NodePort; set config.minioPublicEndpoint to http://<node-ip>:30090
