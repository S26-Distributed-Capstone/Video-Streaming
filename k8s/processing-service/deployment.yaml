apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processing-service
  template:
    metadata:
      labels:
        app: processing-service
    spec:
      containers:
        - name: processing-service
          image: video-streaming-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          command: ["/bin/sh", "-c"]
          args:
            - >
              mvn -pl processing-service -DskipTests exec:java
              -Dexec.mainClass=com.distributed26.videostreaming.processing.ProcessingServiceApplication
          env:
            - name: SERVICE_MODE
              value: "processing"
          envFrom:
            - configMapRef:
                name: video-streaming-config
            - secretRef:
                name: video-streaming-secrets
          volumeMounts:
            - name: processing-spool
              mountPath: /app/processing-spool
          startupProbe:
            httpGet:
              path: /health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: processing-spool
          persistentVolumeClaim:
            claimName: processing-spool-pvc
