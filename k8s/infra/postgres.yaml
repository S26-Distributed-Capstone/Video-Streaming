# Postgres StatefulSet + Service
# StatefulSet gives stable network identity (postgres-0) and persistent storage.
# This replaces the "postgres" service in docker-compose.yaml.
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  # ClusterIP = internal only, same as a Compose service with no "ports:" exposed
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: video-streaming-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: video-streaming-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: video-streaming-config
                  key: PG_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            # Mount the schema file so it runs on first boot
            - name: init-schema
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          # Same healthcheck as your docker-compose.yaml
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "admin"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: init-schema
          configMap:
            name: postgres-init-schema
  # Each replica gets its own PVC — data persists across restarts
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

