{{- $defaultPool := dict
      "name" "default"
      "fullname" (printf "%s-processing" .Release.Name)
      "appLabel" (printf "%s-processing" .Release.Name)
      "replicas" .Values.processingService.replicas
      "spoolStorageSize" .Values.processingService.spoolStorageSize
      "resources" .Values.processingService.resources
      "workerPoolSize" .Values.config.workerPoolSize
      "threadsPerWorker" .Values.config.threadsPerWorker
      "nodeSelector" dict
      "root" .
  -}}
{{- $pools := list $defaultPool -}}
{{- if .Values.processingPools }}
  {{- $pools = list -}}
  {{- range $pool := .Values.processingPools }}
    {{- $poolName := required "processingPools[].name is required" $pool.name -}}
    {{- $resources := required (printf "processingPools[%s].resources is required" $poolName) $pool.resources -}}
    {{- $requests := required (printf "processingPools[%s].resources.requests is required" $poolName) $resources.requests -}}
    {{- $limits := required (printf "processingPools[%s].resources.limits is required" $poolName) $resources.limits -}}
    {{- $pools = append $pools (dict
          "name" $poolName
          "fullname" (printf "%s-processing-%s" $.Release.Name $poolName)
          "appLabel" (printf "%s-processing-%s" $.Release.Name $poolName)
          "replicas" (default 1 $pool.replicas)
          "spoolStorageSize" (default $.Values.processingService.spoolStorageSize $pool.spoolStorageSize)
          "resources" (dict "requests" $requests "limits" $limits)
          "workerPoolSize" (default $.Values.config.workerPoolSize $pool.workerPoolSize)
          "threadsPerWorker" (default $.Values.config.threadsPerWorker $pool.threadsPerWorker)
          "nodeSelector" (default dict $pool.nodeSelector)
          "root" $
      ) -}}
  {{- end }}
{{ end }}
{{- range $pool := $pools }}
{{- $processingScheduling := $pool.root.Values.scheduling.processing | default dict -}}
{{- $affinity := mergeOverwrite (deepCopy (default dict $processingScheduling.affinity)) (dict "podAntiAffinity" (dict "preferredDuringSchedulingIgnoredDuringExecution" (list (dict "weight" 100 "podAffinityTerm" (dict "labelSelector" (dict "matchLabels" (dict "app" $pool.appLabel)) "topologyKey" "kubernetes.io/hostname"))))) -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $pool.fullname }}
spec:
  type: ClusterIP
  selector:
    app: {{ $pool.appLabel }}
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $pool.fullname }}
spec:
  serviceName: {{ $pool.fullname }}
  replicas: {{ $pool.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ $pool.appLabel }}
  template:
    metadata:
      labels:
        app: {{ $pool.appLabel }}
    spec:
      {{- if $pool.nodeSelector }}
      nodeSelector:
{{ toYaml $pool.nodeSelector | indent 8 }}
      {{- else if $processingScheduling.nodeSelector }}
      nodeSelector:
{{ toYaml $processingScheduling.nodeSelector | indent 8 }}
      {{- end }}
      affinity:
{{ toYaml $affinity | indent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ $pool.appLabel }}
      {{- if $processingScheduling.tolerations }}
      tolerations:
{{ toYaml $processingScheduling.tolerations | indent 8 }}
      {{- end }}
      initContainers:
        {{- include "video-streaming.wait-for" (dict "name" "rabbitmq" "host" (printf "%s-rabbitmq" $pool.root.Release.Name) "port" "5672") | nindent 8 }}
        {{- include "video-streaming.wait-for" (dict "name" "postgres" "host" (printf "%s-postgres" $pool.root.Release.Name) "port" "5432") | nindent 8 }}
      containers:
        - name: processing-service
          image: "{{ $pool.root.Values.image.repository }}:{{ $pool.root.Values.image.tag }}"
          imagePullPolicy: {{ $pool.root.Values.image.pullPolicy }}
          ports:
            - containerPort: 8082
          env:
            - name: SERVICE_MODE
              value: "processing"
            {{- if $pool.workerPoolSize }}
            - name: WORKER_POOL_SIZE
              value: {{ $pool.workerPoolSize | quote }}
            {{- end }}
            {{- if $pool.threadsPerWorker }}
            - name: THREADS_PER_WORKER
              value: {{ $pool.threadsPerWorker | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ $pool.root.Release.Name }}-config
            - secretRef:
                name: {{ $pool.root.Release.Name }}-secrets
          volumeMounts:
            - name: processing-spool
              mountPath: /app/processing-spool
          startupProbe:
            httpGet:
              path: /health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: {{ $pool.resources.requests.memory | quote }}
              cpu: {{ $pool.resources.requests.cpu | quote }}
            limits:
              memory: {{ $pool.resources.limits.memory | quote }}
              cpu: {{ $pool.resources.limits.cpu | quote }}
  volumeClaimTemplates:
    - metadata:
        name: processing-spool
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $pool.spoolStorageSize }}

{{ end }}
