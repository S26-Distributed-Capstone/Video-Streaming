
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-streaming
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-streaming
  ports:
    - port: 8083
      targetPort: 8083
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.streamingNodePort }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-streaming
spec:
  replicas: {{ .Values.streamingService.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-streaming
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-streaming
    spec:
      {{- include "video-streaming.pod-scheduling" .Values.scheduling.infra | nindent 6 }}
      initContainers:
        {{- include "video-streaming.wait-for" (dict "name" "postgres" "host" (printf "%s-postgres" .Release.Name) "port" "5432") | nindent 8 }}
        {{- include "video-streaming.wait-for" (dict "name" "minio" "host" (printf "%s-minio" .Release.Name) "port" "9000") | nindent 8 }}
      containers:
        - name: streaming-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8083
          env:
            - name: SERVICE_MODE
              value: "streaming"
            # Inject the node's own IP via the Downward API, then build
            # MINIO_PUBLIC_ENDPOINT from it. In k3s (and most bare-metal clusters)
            # every LoadBalancer service is reachable on any node IP, so the pod's
            # host IP is always a valid external address for MinIO.
            # This env entry overrides the empty value from the ConfigMap.
            {{- if not .Values.minio.loadBalancerIP }}
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: MINIO_PUBLIC_ENDPOINT
              value: "http://$(NODE_IP):9000"
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8083
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: {{ .Values.streamingService.resources.requests.memory | quote }}
              cpu: {{ .Values.streamingService.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.streamingService.resources.limits.memory | quote }}
              cpu: {{ .Values.streamingService.resources.limits.cpu | quote }}
