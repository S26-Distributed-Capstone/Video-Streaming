apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-rabbitmq
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-rabbitmq
rules:
  - apiGroups: [""]
    resources: ["endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-rabbitmq
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-rabbitmq
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-rabbitmq
---
# ── RabbitMQ config ──────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-rabbitmq-config
data:
  enabled_plugins: |
    [rabbitmq_management,rabbitmq_peer_discovery_k8s].
  rabbitmq.conf: |
    ## Clustering via K8s API
    cluster_formation.peer_discovery_backend = rabbit_peer_discovery_k8s
    cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
    cluster_formation.k8s.address_type = hostname
    cluster_formation.k8s.service_name = {{ .Release.Name }}-rabbitmq-headless
    cluster_formation.k8s.hostname_suffix = .{{ .Release.Name }}-rabbitmq-headless.{{ .Release.Namespace }}.svc.cluster.local
    cluster_formation.node_cleanup.interval = 30
    cluster_formation.node_cleanup.only_log_warning = true

    ## HA: mirror all queues to all nodes
    queue_master_locator = min-masters

    ## Networking
    loopback_users.guest = false

    ## Allow deprecated feature to avoid startup failure
    deprecated_features.permit.management_metrics_collection = true
---
# ── Headless Service: peer discovery + StatefulSet DNS ──
# publishNotReadyAddresses: true is CRITICAL — without it, new nodes can't
# discover the seed node because they aren't "ready" yet during boot.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-rabbitmq-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: {{ .Release.Name }}-rabbitmq
  ports:
    - name: amqp
      port: 5672
    - name: epmd
      port: 4369
    - name: cluster
      port: 25672
---
# ── Client Service: what your app services connect to ──
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-rabbitmq
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
# ── StatefulSet: 3-node RabbitMQ cluster ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-rabbitmq
spec:
  serviceName: {{ .Release.Name }}-rabbitmq-headless
  replicas: {{ .Values.rabbitmq.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ .Release.Name }}-rabbitmq
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-rabbitmq
    spec:
      serviceAccountName: {{ .Release.Name }}-rabbitmq
      terminationGracePeriodSeconds: 120
      {{- include "video-streaming.pod-scheduling" .Values.scheduling.infra | nindent 6 }}
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
            - containerPort: 4369
              name: epmd
            - containerPort: 25672
              name: cluster
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: RABBITMQ_PASS
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: RABBITMQ_ERLANG_COOKIE
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RABBITMQ_NODENAME
              value: "rabbit@$(POD_NAME).{{ .Release.Name }}-rabbitmq-headless.{{ .Release.Namespace }}.svc.cluster.local"
            - name: RABBITMQ_USE_LONGNAME
              value: "true"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq/mnesia
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: plugins
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
          startupProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 25
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "status"]
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 45
            failureThreshold: 5
          resources:
            requests:
              memory: "768Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-rabbitmq-config
        - name: plugins
          configMap:
            name: {{ .Release.Name }}-rabbitmq-config
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storageSize }}
