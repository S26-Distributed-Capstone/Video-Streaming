# Source: video-streaming/templates/rabbitmq.yaml
# ── Headless Service: peer discovery + StatefulSet DNS ──
# publishNotReadyAddresses: true is CRITICAL — without it, new nodes can't
# discover the seed node because they aren't "ready" yet during boot.
apiVersion: v1
kind: Service
metadata:
  name: vs-rabbitmq-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: vs-rabbitmq
  ports:
    - name: amqp
      port: 5672
    - name: epmd
      port: 4369
    - name: cluster
      port: 25672
---
