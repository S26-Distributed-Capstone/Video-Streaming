# Source: video-streaming/templates/autoscaler.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vs-autoscaler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vs-autoscaler
  template:
    metadata:
      labels:
        app: vs-autoscaler
    spec:
      serviceAccountName: vs-autoscaler
      
      nodeSelector:
        workload-role: infra
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      # Spread across different infra nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: vs-autoscaler
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for vs-rabbitmq:5672..."
              until nc -z vs-rabbitmq 5672 2>/dev/null; do
                sleep 2
              done
              echo "vs-rabbitmq:5672 is up."
      containers:
        - name: autoscaler
          image: "tanigross/video-streaming-autoscaler:1.4"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
              name: health
          env:
            - name: KUBE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HELM_RELEASE_NAME
              value: "vs"
            - name: STATEFULSET_NAME
              value: "vs-processing"
            - name: TOTAL_NODES
              value: "12"
            - name: MIN_ACTIVE_NODES
              value: "2"
            - name: REPLICAS_PER_NODE
              value: "1"
            - name: REPLICAS_PER_CPU
              value: "1"
            - name: SCALE_UP_THRESHOLD
              value: "20"
            - name: SCALE_DOWN_THRESHOLD
              value: "5"
            - name: MAX_SCALE_UP_STEP
              value: "3"
            - name: MAX_SCALE_DOWN_STEP
              value: "1"
            - name: POLL_INTERVAL_SECONDS
              value: "10"
            - name: SCALE_COOLDOWN_SECONDS
              value: "10"
            - name: SCALE_DOWN_IDLE_POLLS
              value: "6"
            - name: NODE_LABEL_SELECTOR
              value: "workload-role=app"
            - name: RABBITMQ_HOST
              value: "vs-rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_MANAGEMENT_PORT
              value: "15672"
            - name: RABBITMQ_VHOST
              value: "/"
            - name: RABBITMQ_EXCHANGE
              value: "upload.events"
            - name: RABBITMQ_TASK_QUEUE
              value: "upload.task.queue"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: RABBITMQ_PASS
          livenessProbe:
            httpGet:
              path: /
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
