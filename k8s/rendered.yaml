apiVersion: apps/v1
kind: Deployment
metadata:
  name: vs-status
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vs-status
  template:
    metadata:
      labels:
        app: vs-status
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for vs-rabbitmq:5672..."
              until nc -z vs-rabbitmq 5672 2>/dev/null; do
                sleep 2
              done
              echo "vs-rabbitmq:5672 is up."
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for vs-postgres:5432..."
              until nc -z vs-postgres 5432 2>/dev/null; do
                sleep 2
              done
              echo "vs-postgres:5432 is up."
      containers:
        - name: status-service
          image: "tanigross/video-streaming-app:1.2"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SERVICE_MODE
              value: "status"
          envFrom:
            - configMapRef:
                name: vs-config
            - secretRef:
                name: vs-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
