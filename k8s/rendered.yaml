# Source: video-streaming/templates/pgbouncer.yaml
# ── PgBouncer — connection pooler between app pods and Postgres ──────────────
#
# Why this exists:
#   With autoscaling, total DB connections = pods × pool_size_per_pod.
#   At full scale (e.g. 12 nodes × 6 replicas × pool_size=10 = 720 connections)
#   this easily exceeds Postgres's max_connections.
#
#   PgBouncer runs in TRANSACTION mode between apps and Postgres:
#     - App pods connect to PgBouncer (cheap — just a socket)
#     - PgBouncer maintains pgbouncer.serverPoolSize real Postgres connections
#     - So Postgres only sees pgbouncer.serverPoolSize connections, regardless of pod count
#
# Connection flow:
#   processing-service (HikariCP pool) → pgbouncer-service:5432 → postgres:5432
#
apiVersion: v1
kind: Service
metadata:
  name: vs-pgbouncer
  labels:
    app: vs-pgbouncer
spec:
  type: ClusterIP
  selector:
    app: vs-pgbouncer
  ports:
    - name: pgbouncer
      port: 5432
      targetPort: 5432
---
