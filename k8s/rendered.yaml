# Source: video-streaming/templates/postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vs-postgres
spec:
  serviceName: vs-postgres
  replicas: 1
  selector:
    matchLabels:
      app: vs-postgres
  template:
    metadata:
      labels:
        app: vs-postgres
    spec:
      
      nodeSelector:
        workload-role: infra
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          # Pass max_connections as an arg — entrypoint forwards it to the postgres binary.
          # Using `command` would bypass docker-entrypoint.sh and run as root (not allowed).
          args: ["-c", "max_connections=100"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: vs-config
                  key: PG_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-schema
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "admin"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: init-schema
          configMap:
            name: vs-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
