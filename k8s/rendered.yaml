# Source: video-streaming/templates/rabbitmq.yaml
# ── StatefulSet: 3-node RabbitMQ cluster ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vs-rabbitmq
spec:
  serviceName: vs-rabbitmq-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: vs-rabbitmq
  template:
    metadata:
      labels:
        app: vs-rabbitmq
    spec:
      serviceAccountName: vs-rabbitmq
      terminationGracePeriodSeconds: 120
      
      nodeSelector:
        workload-role: infra
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
            - containerPort: 4369
              name: epmd
            - containerPort: 25672
              name: cluster
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: RABBITMQ_PASS
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: RABBITMQ_ERLANG_COOKIE
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RABBITMQ_NODENAME
              value: "rabbit@$(POD_NAME).vs-rabbitmq-headless.video-streaming.svc.cluster.local"
            - name: RABBITMQ_USE_LONGNAME
              value: "true"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq/mnesia
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: plugins
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "status"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: vs-rabbitmq-config
        - name: plugins
          configMap:
            name: vs-rabbitmq-config
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
