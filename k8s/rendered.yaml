# Source: video-streaming/templates/pgbouncer.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vs-pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vs-pgbouncer
  template:
    metadata:
      labels:
        app: vs-pgbouncer
    spec:
      
      nodeSelector:
        workload-role: infra
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for vs-postgres:5432..."
              until nc -z vs-postgres 5432 2>/dev/null; do
                sleep 2
              done
              echo "vs-postgres:5432 is up."
      containers:
        - name: pgbouncer
          image: "edoburu/pgbouncer:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: pgbouncer
          env:
            # ── Upstream Postgres ──────────────────────────────────────────────
            - name: DB_HOST
              value: "vs-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: vs-config
                  key: PG_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: POSTGRES_PASSWORD
            # ── PgBouncer tuning ───────────────────────────────────────────────
            # TRANSACTION mode: connection is released back to the pool after each
            # transaction — ideal for short-lived queries with no session state.
            - name: POOL_MODE
              value: "transaction"
            # Real Postgres connections kept open by PgBouncer.
            - name: DEFAULT_POOL_SIZE
              value: "25"
            - name: MIN_POOL_SIZE
              value: "5"
            # Max inbound connections from all app pods combined.
            - name: MAX_CLIENT_CONN
              value: "1000"
            - name: SERVER_IDLE_TIMEOUT
              value: "300"
            - name: AUTH_TYPE
              value: "scram-sha-256"
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
