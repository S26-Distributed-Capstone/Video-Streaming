apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-processing-spool
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.processingService.spoolStorageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-processing
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-processing
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-processing
spec:
  replicas: {{ .Values.processingService.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-processing
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-processing
    spec:
      initContainers:
        {{- include "video-streaming.wait-for" (dict "name" "rabbitmq" "host" (printf "%s-rabbitmq" .Release.Name) "port" "5672") | nindent 8 }}
        {{- include "video-streaming.wait-for" (dict "name" "postgres" "host" (printf "%s-postgres" .Release.Name) "port" "5432") | nindent 8 }}
      containers:
        - name: processing-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8082
          command: ["/bin/sh", "-c"]
          args:
            - >
              mvn -pl processing-service -DskipTests exec:java
              -Dexec.mainClass=com.distributed26.videostreaming.processing.ProcessingServiceApplication
          env:
            - name: SERVICE_MODE
              value: "processing"
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secrets
          volumeMounts:
            - name: processing-spool
              mountPath: /app/processing-spool
          startupProbe:
            httpGet:
              path: /health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: {{ .Values.processingService.resources.requests.memory | quote }}
              cpu: {{ .Values.processingService.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.processingService.resources.limits.memory | quote }}
              cpu: {{ .Values.processingService.resources.limits.cpu | quote }}
      volumes:
        - name: processing-spool
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-processing-spool

