# helm/cronjob.yaml — Run Chaos Killer Bot as a Kubernetes CronJob
# Install in your cluster:
#   kubectl apply -f chaos-monkey/helm/cronjob.yaml
#
# Or parameterize with values:
#   helm template chaos-monkey . -f chaos-monkey/helm/values.yaml | kubectl apply -f -

apiVersion: batch/v1
kind: CronJob
metadata:
  name: chaos-killer-bot
  namespace: default
spec:
  schedule: "*/1 * * * *"  # Every minute
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: chaos-killer-bot
          containers:
          - name: chaos-killer-bot
            image: python:3.11-slim
            imagePullPolicy: IfNotPresent
            command:
            - /bin/bash
            - -c
            - |
              set -e
              cd /app
              pip install -q -r requirements.txt
              python killer_bot.py
            env:
            # Chaos configuration
            - name: CHAOS_ENABLED
              value: "true"
            - name: CHAOS_PRESET
              value: "core"  # Options: core, infra, all, aggressive
            - name: CHAOS_INTERVAL_MIN
              value: "30"
            - name: CHAOS_INTERVAL_MAX
              value: "60"
            - name: CHAOS_PROBABILITY
              value: "0.7"  # 70% chance to kill on each interval
            - name: CHAOS_STATEFUL_SAFE_MODE
              value: "true"  # Graceful restart for stateful services
            - name: CHAOS_NAMESPACE
              value: "default"
            - name: CHAOS_LOG_TO_RABBITMQ
              value: "true"
            # RabbitMQ credentials
            - name: RABBITMQ_HOST
              value: "vs-rabbitmq"  # Helm release name: vs-rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: vs-secrets
                  key: rabbitmq-password
            volumeMounts:
            - name: chaos-script
              mountPath: /app
          volumes:
          - name: chaos-script
            configMap:
              name: chaos-killer-bot-script
              defaultMode: 0755
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-killer-bot
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-killer-bot
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-killer-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaos-killer-bot
subjects:
- kind: ServiceAccount
  name: chaos-killer-bot
  namespace: default

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chaos-killer-bot-script
  namespace: default
data:
  killer_bot.py: |
    # (contents of killer_bot.py injected here)
  requirements.txt: |
    kubernetes>=30.0.0
    pika>=1.3.1
    python-dotenv>=1.0.0
