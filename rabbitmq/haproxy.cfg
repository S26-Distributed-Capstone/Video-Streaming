global
    log stdout format raw local0
    maxconn 4096

resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold other      10s
    hold refused    10s
    hold nx         10s
    hold timeout    10s
    hold valid      10s
    accepted_payload_size 8192

defaults
    mode tcp
    timeout connect 5s
    timeout client  120s
    timeout server  120s
    timeout tunnel  120s

# ── AMQP (5672) ──────────────────────────────────────
frontend ft_amqp
    bind *:5672
    default_backend bk_amqp

backend bk_amqp
    balance roundrobin
    option tcp-check
    server rabbitmq1 rabbitmq1:5672 check inter 5s rise 2 fall 3 resolvers docker init-addr last,libc,none
    server rabbitmq2 rabbitmq2:5672 check inter 5s rise 2 fall 3 resolvers docker init-addr last,libc,none
    server rabbitmq3 rabbitmq3:5672 check inter 5s rise 2 fall 3 resolvers docker init-addr last,libc,none

# ── Management UI (15672) ────────────────────────────
frontend ft_mgmt
    bind *:15672
    default_backend bk_mgmt

backend bk_mgmt
    balance roundrobin
    option tcp-check
    server rabbitmq1 rabbitmq1:15672 check inter 5s rise 2 fall 3 resolvers docker init-addr last,libc,none
    server rabbitmq2 rabbitmq2:15672 check inter 5s rise 2 fall 3 resolvers docker init-addr last,libc,none
    server rabbitmq3 rabbitmq3:15672 check inter 5s rise 2 fall 3 resolvers docker init-addr last,libc,none
